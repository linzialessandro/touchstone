# Touchstone — open-weight competitor matrix only.
# Grok wins as benchmark *designer*, not as a scored competitor.

version: 1
competition: touchstone
metric: pass_rate

intent: >
  Touchstone is an AI coding-reasoning benchmark on Kaggle.
  Open-weight models compete on free GPU.
  Grok's win is design quality of the benchmark, not a leaderboard entry.

tracks:
  open:
    description: >
      Only competitive track. Run on Kaggle free GPU.
    provider: hf
    models:
      - id: Qwen/Qwen2.5-1.5B-Instruct
        display: Qwen2.5-1.5B-Instruct
        size_class: small
      - id: Qwen/Qwen2.5-7B-Instruct
        display: Qwen2.5-7B-Instruct
        size_class: mid
      - id: microsoft/Phi-3.5-mini-instruct
        display: Phi-3.5-mini-instruct
        size_class: small
      - id: meta-llama/Llama-3.2-3B-Instruct
        display: Llama-3.2-3B-Instruct
        size_class: small
      - id: deepseek-ai/DeepSeek-Coder-V2-Lite-Instruct
        display: DeepSeek-Coder-V2-Lite-Instruct
        size_class: mid
      - id: mistralai/Mistral-7B-Instruct-v0.3
        display: Mistral-7B-Instruct-v0.3
        size_class: mid

integrity:
  - Only open-weight models appear as competitors
  - Same prompts and tests for all competitors
  - Grok is designer credit, not a scored entry
  - Publish run artifacts when claiming ranks
