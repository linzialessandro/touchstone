# Touchstone — suggested models for local HF notebooks (optional).
# On Kaggle Benchmarks, use `kaggle b t models` and free Daily AI Quota for any catalog model.
# Grok 4.5 = benchmark designer showcase; Touchstone the project competes on Kaggle.

version: 1
competition: touchstone
metric: pass_rate

intent: >
  Showcase Grok 4.5's ability to design code-reasoning benchmarks that evaluate other models.
  Touchstone competes on Kaggle as a Community Benchmark product.
  Score free catalog models (open or closed) under one executable metric.

tracks:
  kaggle_benchmarks:
    description: >
      Prefer free Model Proxy / Daily AI Quota runs via CLI + UI.
      See live catalog: kaggle benchmarks tasks models
    note: deepseek, qwen, gemma, gpt-oss, glm, gemini, claude, grok-as-subject, etc.

  local_hf_notebooks:
    description: Optional Kaggle GPU notebooks with HF weights (not required for Benchmarks LB).
    provider: hf
    models:
      - id: Qwen/Qwen2.5-1.5B-Instruct
        display: Qwen2.5-1.5B-Instruct
      - id: Qwen/Qwen2.5-7B-Instruct
        display: Qwen2.5-7B-Instruct
      - id: mistralai/Mistral-7B-Instruct-v0.3
        display: Mistral-7B-Instruct-v0.3

integrity:
  - Same prompts and tests for every scored model
  - Fair use of Daily AI Quota and rate limits
  - Grok 4.5 design narrative is separate from which models appear on the LB
  - Publish methods when claiming results
